<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地球背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  
  <!-- 经纬线 -->
  <ellipse cx="50" cy="50" rx="45" ry="20" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="45" ry="35" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="5" y1="50" x2="95" y2="50" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 3D 立方体标识 -->
  <g transform="translate(50, 50)">
    <polygon points="-8,-15 8,-15 8,-5 -8,-5" fill="#fff" opacity="0.9"/>
    <polygon points="8,-15 18,-10 18,0 8,-5" fill="#fff" opacity="0.7"/>
    <polygon points="-8,-5 8,-5 18,0 2,0" fill="#fff" opacity="0.5"/>
  </g>
  
  <!-- 字母 C -->
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">C</text>
</svg>
