<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>烟花秀 - Fireworks Symphony</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --night-black: #0a0a0f;
      --deep-purple: #1a1a2e;
      --electric-blue: #16213e;
      --neon-cyan: #00f5ff;
      --bright-gold: #ffd700;
      --fire-red: #ff4757;
      --spark-white: #fff;
      --control-bg: rgb(26, 26, 46, 90%);
      --control-border: rgb(0, 245, 255, 30%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: Rajdhani, sans-serif;
      background: linear-gradient(135deg, var(--night-black) 0%, var(--deep-purple) 50%, var(--electric-blue) 100%);
      min-height: 100vh;
      color: var(--spark-white);
      overflow: hidden;
      touch-action: manipulation;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
    }

    /* Mobile Toggle Button */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      color: var(--neon-cyan);
      font-size: 20px;
      cursor: pointer;
      backdrop-filter: blur(15px);
      box-shadow: 0 4px 15px rgb(0, 0, 0, 30%);
      transition: all 0.3s ease;
      align-items: center;
      justify-content: center;
    }

    .mobile-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgb(0, 245, 255, 50%);
    }

    .mobile-toggle.active {
      background: var(--neon-cyan);
      color: var(--night-black);
    }

    /* Control Panel */
    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      background: var(--control-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--control-border);
      border-radius: 15px;
      padding: 20px;
      z-index: 100;
      box-shadow: 0 10px 30px rgb(0, 0, 0, 50%);
      transition: all 0.3s ease;
    }

    .control-panel:hover {
      box-shadow: 0 15px 40px rgb(0, 245, 255, 20%);
    }

    .panel-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .panel-title {
      font-family: Orbitron, monospace;
      font-size: 24px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
      margin-bottom: 5px;
    }

    .panel-subtitle {
      font-size: 14px;
      color: rgb(255, 255, 255, 70%);
      font-weight: 300;
    }

    /* Control Sections */
    .control-section {
      margin-bottom: 25px;
      padding: 15px;
      background: rgb(0, 0, 0, 30%);
      border-radius: 10px;
      border: 1px solid rgb(255, 255, 255, 10%);
    }

    .section-title {
      font-family: Orbitron, monospace;
      font-size: 16px;
      font-weight: 500;
      color: var(--bright-gold);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Slider Controls */
    .control-group {
      margin-bottom: 15px;
    }

    .control-label {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: var(--spark-white);
      margin-bottom: 8px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider {
      flex: 1;
      height: 6px;
      background: rgb(255, 255, 255, 20%);
      border-radius: 3px;
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      background: linear-gradient(45deg, var(--neon-cyan), var(--bright-gold));
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgb(0, 245, 255, 50%);
      transition: all 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgb(0, 245, 255, 80%);
    }

    .value-display {
      font-family: Orbitron, monospace;
      font-size: 12px;
      color: var(--neon-cyan);
      min-width: 50px;
      text-align: right;
      background: rgb(0, 0, 0, 50%);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* Buttons */
    .control-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, var(--fire-red), var(--bright-gold));
      color: var(--spark-white);
      border: none;
      border-radius: 8px;
      font-family: Orbitron, monospace;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgb(255, 71, 87, 30%);
    }

    .control-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgb(255, 71, 87, 50%);
    }

    .control-button:active {
      transform: translateY(0);
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .button-row .control-button {
      flex: 1;
      padding: 10px;
      font-size: 12px;
    }

    .secondary-button {
      background: linear-gradient(45deg, var(--electric-blue), var(--neon-cyan)) !important;
      box-shadow: 0 4px 15px rgb(0, 245, 255, 30%) !important;
    }

    .secondary-button:hover {
      box-shadow: 0 8px 25px rgb(0, 245, 255, 50%) !important;
    }

    /* Touch Controls */
    .touch-controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: var(--control-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--control-border);
      border-radius: 25px;
      padding: 15px 20px;
      gap: 15px;
      align-items: center;
    }

    .touch-button {
      background: linear-gradient(45deg, var(--fire-red), var(--bright-gold));
      color: var(--spark-white);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgb(255, 71, 87, 30%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .touch-button:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgb(255, 71, 87, 50%);
    }

    .touch-button.secondary {
      background: linear-gradient(45deg, var(--electric-blue), var(--neon-cyan));
      box-shadow: 0 4px 15px rgb(0, 245, 255, 30%);
    }

    .touch-button.secondary:hover {
      box-shadow: 0 8px 25px rgb(0, 245, 255, 50%);
    }

    /* Canvas Area */
    .canvas-area {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #fireworks-canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Performance Stats */
    .stats {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--control-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--control-border);
      border-radius: 10px;
      padding: 15px;
      font-family: Orbitron, monospace;
      font-size: 12px;
      color: var(--neon-cyan);
    }

    .stat-item {
      margin-bottom: 5px;
    }

    /* Loading Screen */
    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--night-black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-text {
      font-family: Orbitron, monospace;
      font-size: 24px;
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan);
      margin-bottom: 20px;
    }

    .loading-bar {
      width: 300px;
      height: 4px;
      background: rgb(255, 255, 255, 20%);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--bright-gold));
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    /* Responsive Design */
    @media (width <=768px) {
      .control-panel {
        display: none;

        /* 完全隐藏控制面板 */
      }

      .control-panel.show {
        display: block;

        /* 只有在显示状态时才显示 */
        width: calc(100% - 40px);
        max-width: 350px;
        position: fixed;
        top: 80px;
        left: 20px;
        transform: translateX(0);
        transition: all 0.3s ease;
        max-height: calc(100vh - 200px);
        overflow-y: auto;
        z-index: 150;
        background: var(--control-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--control-border);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgb(0, 0, 0, 50%);
      }

      .mobile-toggle {
        display: flex;
        z-index: 200;

        /* 确保按钮在最上层 */
      }

      .touch-controls {
        display: flex;
        z-index: 150;

        /* 确保触摸控制可见 */
      }

      .stats {
        top: 20px;
        right: 80px;
        font-size: 10px;
        padding: 10px;
        z-index: 100;
      }

      .panel-title {
        font-size: 20px;
      }

      .section-title {
        font-size: 14px;
      }

      .control-label {
        font-size: 12px;
      }

      .value-display {
        font-size: 10px;
        min-width: 40px;
      }

      .control-button {
        padding: 10px;
        font-size: 12px;
      }

      /* 优化滑块在移动端的触摸体验 */
      .slider::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
      }

      /* 隐藏桌面端的一些控制按钮 */
      .button-row {
        flex-direction: column;
        gap: 8px;
      }
    }

    @media (width <=480px) {
      .control-panel {
        display: none;

        /* 完全隐藏 */
      }

      .control-panel.show {
        display: block;

        /* 显示时的样式 */
        width: calc(100% - 20px);
        left: 10px;
        top: 70px;
        z-index: 150;
        background: var(--control-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--control-border);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgb(0, 0, 0, 50%);
        max-height: calc(100vh - 200px);
        overflow-y: auto;
      }

      .mobile-toggle {
        left: 10px;
        top: 10px;
        width: 45px;
        height: 45px;
        font-size: 18px;
        z-index: 200;
      }

      .stats {
        right: 65px;
        top: 10px;
        padding: 8px;
        z-index: 100;
      }

      .touch-controls {
        bottom: 10px;
        padding: 10px 15px;
        z-index: 150;
      }

      .touch-button {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      .panel-title {
        font-size: 18px;
      }

      .control-section {
        padding: 12px;
        margin-bottom: 15px;
      }
    }

    /* 横屏模式优化 */
    @media (height <=500px) and (orientation: landscape) {
      .control-panel {
        display: none;

        /* 横屏时也完全隐藏 */
      }

      .control-panel.show {
        display: block;
        max-height: calc(100vh - 120px);
        font-size: 12px;
        z-index: 150;
        background: var(--control-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--control-border);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgb(0, 0, 0, 50%);
        overflow-y: auto;
      }

      .control-section {
        padding: 10px;
        margin-bottom: 10px;
      }

      .section-title {
        font-size: 12px;
        margin-bottom: 8px;
      }

      .control-group {
        margin-bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Mobile Toggle Button -->
    <!-- <button class="mobile-toggle" id="mobile-toggle" onclick="toggleControlPanel()">
      ⚙️
    </button> -->

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-text">正在进入烟花秀...</div>
      <div class="loading-bar">
        <div class="loading-progress" id="loading-progress"></div>
      </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel" id="control-panel">
      <div class="panel-header">
        <div class="panel-title">烟花秀</div>
        <div class="panel-subtitle">Fireworks Symphony</div>
      </div>

      <!-- Launch Controls -->
      <div class="control-section">
        <div class="section-title">发射控制</div>

        <div class="control-group">
          <label class="control-label">发射频率</label>
          <div class="slider-container">
            <input type="range" class="slider" id="launchRate" min="0.1" max="2.0" step="0.1" value="0.8">
            <span class="value-display" id="launchRate-value">0.8</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">爆炸强度</label>
          <div class="slider-container">
            <input type="range" class="slider" id="explosionPower" min="50" max="200" step="10" value="120">
            <span class="value-display" id="explosionPower-value">120</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">粒子数量</label>
          <div class="slider-container">
            <input type="range" class="slider" id="particleCount" min="20" max="100" step="5" value="50">
            <span class="value-display" id="particleCount-value">50</span>
          </div>
        </div>
      </div>

      <!-- Visual Effects -->
      <div class="control-section">
        <div class="section-title">视觉效果</div>

        <div class="control-group">
          <label class="control-label">重力强度</label>
          <div class="slider-container">
            <input type="range" class="slider" id="gravity" min="0.05" max="0.3" step="0.01" value="0.15">
            <span class="value-display" id="gravity-value">0.15</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">拖尾长度</label>
          <div class="slider-container">
            <input type="range" class="slider" id="trailLength" min="0.8" max="0.98" step="0.01" value="0.92">
            <span class="value-display" id="trailLength-value">0.92</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">闪烁强度</label>
          <div class="slider-container">
            <input type="range" class="slider" id="sparkleIntensity" min="0" max="1" step="0.1" value="0.6">
            <span class="value-display" id="sparkleIntensity-value">0.6</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="control-section">
        <button class="control-button" onclick="launchFirework()">🎆 发射烟花</button>
        <div class="button-row">
          <button class="control-button secondary-button" onclick="launchBurst()">连发</button>
          <button class="control-button secondary-button" onclick="clearScreen()">清屏</button>
        </div>
        
      </div>
    </div>

    <!-- Performance Stats -->
    <div class="stats" id="stats">
      <div class="stat-item">FPS: <span id="fps">60</span></div>
      <div class="stat-item">烟花: <span id="firework-count">0</span></div>
      <div class="stat-item">粒子: <span id="particle-count">0</span></div>
    </div>

    <!-- Touch Controls for Mobile -->
    <div class="touch-controls" id="touch-controls">
      <button class="touch-button" id="launch-btn" title="发射烟花">🎆</button>
      <button class="touch-button secondary" id="burst-btn" title="连发">💥</button>
      
      <button class="touch-button secondary" id="clear-btn" title="清屏">🧹</button>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area">
      <div id="fireworks-canvas"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // 烟花秀参数配置
    // ═══════════════════════════════════════════════════════════════════════

    let params = {
      launchRate: 0.8,
      explosionPower: 120,
      particleCount: 50,
      gravity: 0.15,
      trailLength: 0.92,
      sparkleIntensity: 0.6,
      maxParticles: 500,
      maxFireworks: 10
    };

    // ═══════════════════════════════════════════════════════════════════════
    // 全局变量
    // ═══════════════════════════════════════════════════════════════════════

    let fireworks = [];
    let particles = [];
    let lastLaunch = 0;
    let frameCounter = 0;
    let lastFPSUpdate = 0;
    let lastStatsUpdate = 0;
    let currentFPS = 60;

    // 颜色调色板 - 更丰富的色彩组合
    const colorPalettes = [
      // 经典烟花色彩
      ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#fd79a8'],
      // 紫色梦幻
      ['#a29bfe', '#6c5ce7', '#fd79a8', '#fdcb6e', '#e84393', '#74b9ff'],
      // 绿色自然
      ['#00b894', '#00cec9', '#55a3ff', '#6c5ce7', '#e17055', '#fdcb6e'],
      // 暖色系
      ['#ff7675', '#fd79a8', '#fdcb6e', '#e17055', '#ff6348', '#ffa502'],
      // 冷色系
      ['#74b9ff', '#0984e3', '#00cec9', '#6c5ce7', '#a29bfe', '#55a3ff'],
      // 彩虹色
      ['#ff0000', '#ff8000', '#ffff00', '#80ff00', '#00ff80', '#0080ff', '#8000ff'],
      // 金色奢华
      ['#f39c12', '#e67e22', '#d35400', '#f1c40f', '#e74c3c', '#c0392b'],
      // 银色优雅
      ['#bdc3c7', '#95a5a6', '#7f8c8d', '#ecf0f1', '#d5dbdb', '#85929e']
    ];

    // 特殊烟花类型
    const fireworkTypes = [
      'burst',      // 爆炸型
      'willow',     // 柳树型
      'chrysanthemum', // 菊花型
      'palm',       // 棕榈型
      'ring',       // 环形
      'heart',      // 心形
      'star'        // 星形
    ];

    

    // ═══════════════════════════════════════════════════════════════════════
    // P5.js 主要函数
    // ═══════════════════════════════════════════════════════════════════════

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('fireworks-canvas');

      // 初始化加载进度
      simulateLoading();

      // 设置初始背景
      background(10, 10, 15);

      // 初始化控制器
      initializeControls();

      // 优化移动端体验
      optimizeForMobile();

      // 初始化触摸按钮（备用方案）
      initializeTouchButtons();
    }

    function draw() {
      // 创建拖尾效果
      fill(10, 10, 15, (1 - params.trailLength) * 255);
      noStroke();
      rect(0, 0, width, height);

      // 性能监控：根据FPS自动调整
      frameCounter++;
      if (millis() - lastFPSUpdate > 500) {
        currentFPS = frameCounter * 2;
        frameCounter = 0;
        lastFPSUpdate = millis();

        // 自动降级：如果FPS过低，减少粒子数量
        if (currentFPS < 30 && params.particleCount > 20) {
          params.particleCount = Math.max(20, params.particleCount - 5);
          params.launchRate = Math.max(0.3, params.launchRate - 0.1);
        } else if (currentFPS > 55 && params.particleCount < 50) {
          params.particleCount = Math.min(50, params.particleCount + 5);
          params.launchRate = Math.min(0.8, params.launchRate + 0.1);
        }
      }

      // 计算当前总粒子数
      let totalParticles = 0;
      fireworks.forEach(fw => {
        totalParticles += fw.particles.length;
      });

      // 自动发射烟花 - 检查是否可以发射新烟花
      let canLaunchNew = totalParticles < params.maxParticles && fireworks.length < params.maxFireworks;
      
      if (millis() - lastLaunch > 1000 / params.launchRate) {
        if (canLaunchNew && random() < 0.7) {
          launchRandomFirework();
        }
        lastLaunch = millis();
      }

      // 更新和绘制烟花
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].display();

        if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
          fireworks.splice(i, 1);
        }
      }

      // 性能优化：定期清理超出屏幕范围的烟花
      if (frameCount % 60 === 0) {
        cleanupOffscreenFireworks();
      }

      // 减少DOM更新频率：每10帧更新一次统计信息
      if (millis() - lastStatsUpdate > 100) {
        updateStats();
        lastStatsUpdate = millis();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 烟花类定义
    // ═══════════════════════════════════════════════════════════════════════

    class Firework {
      constructor(x, y, targetX, targetY, colors, type) {
        this.x = x;
        this.y = y;
        this.targetX = targetX;
        this.targetY = targetY;
        this.colors = colors || random(colorPalettes);
        this.type = type || random(fireworkTypes);

        // 发射阶段
        this.exploded = false;
        
        // 使用固定的初始向上速度，而不是基于目标点计算
        let distance = dist(x, y, targetX, targetY);
        let initialSpeed = map(distance, 100, height * 0.7, 10, 16);
        let angle = atan2(targetY - y, targetX - x);
        
        this.vx = cos(angle) * initialSpeed;
        this.vy = sin(angle) * initialSpeed;

        // 爆炸粒子
        this.particles = [];

        // 视觉效果
        this.trail = [];
        this.brightness = 255;
        this.size = random(6, 12);

        // 音效模拟（视觉反馈）
        this.shockwave = 0;
        this.shockwaveMax = random(50, 100);
      }

      update() {
        if (!this.exploded) {
          // 发射阶段 - 遵循真实物理原理
          this.x += this.vx;
          this.y += this.vy;
          
          // 重力加速度（恒定向下）
          this.vy += params.gravity;

          // 添加拖尾
          this.trail.push({
            x: this.x,
            y: this.y,
            brightness: this.brightness,
            size: this.size * 0.5
          });
          if (this.trail.length > 15) {
            this.trail.shift();
          }

          // 检查是否到达最高点（速度接近0时爆炸）
          let distance = dist(this.x, this.y, this.targetX, this.targetY);
          let speed = sqrt(this.vx * this.vx + this.vy * this.vy);
          let shouldExplode = false;

          // 到达最高点（速度接近0）且仍在上升
          if (speed < 0.3 && this.vy < 0) {
            shouldExplode = true;
          }

          // 到达目标点
          if (distance < 15) {
            shouldExplode = true;
          }

          // 开始下降时爆炸
          if (this.vy > 0.3) {
            shouldExplode = true;
          }

          // 边界检查 - 防止烟花飞出屏幕
          if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
            shouldExplode = true;
          }

          // 如果烟花飞得太高
          if (this.y < this.targetY - 100) {
            shouldExplode = true;
          }

          if (shouldExplode) {
            // 在当前位置爆炸，不修改位置
            this.explode();
          }
        } else {
          // 爆炸阶段 - 更新粒子
          for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].isDead()) {
              this.particles.splice(i, 1);
            }
          }

          // 更新冲击波
          if (this.shockwave < this.shockwaveMax) {
            this.shockwave += 3;
          }
        }
      }

      display() {
        if (!this.exploded) {
          // 绘制发射拖尾 - 更华丽
          for (let i = 0; i < this.trail.length; i++) {
            let alpha = map(i, 0, this.trail.length - 1, 0, 255);
            let size = map(i, 0, this.trail.length - 1, 2, this.size);
            let trail = this.trail[i];

            // 主拖尾
            fill(255, 255, 255, alpha);
            noStroke();
            ellipse(trail.x, trail.y, size);

            // 内核光芒
            fill(255, 255, 100, alpha * 0.7);
            ellipse(trail.x, trail.y, size * 0.6);
          }

          // 绘制主体 - 更亮更大
          fill(255, 255, 255, this.brightness);
          ellipse(this.x, this.y, this.size);

          // 内核
          fill(255, 255, 150, this.brightness);
          ellipse(this.x, this.y, this.size * 0.6);

          // 添加光晕效果 - 多层光晕
          for (let r = this.size * 3; r > 0; r -= this.size * 0.5) {
            fill(255, 255, 255, 15);
            ellipse(this.x, this.y, r);
          }
        } else {
          // 绘制冲击波
          if (this.shockwave < this.shockwaveMax) {
            stroke(255, 255, 255, 100 - (this.shockwave / this.shockwaveMax) * 100);
            strokeWeight(3);
            noFill();
            ellipse(this.x, this.y, this.shockwave * 2);

            stroke(255, 255, 150, 50 - (this.shockwave / this.shockwaveMax) * 50);
            strokeWeight(1);
            ellipse(this.x, this.y, this.shockwave * 2.5);
          }

          // 绘制爆炸粒子
          for (let particle of this.particles) {
            particle.display();
          }
        }
      }

      explode() {
        this.exploded = true;

        // 根据类型创建不同的爆炸模式
        this.createExplosionByType();

        // 添加额外的闪烁粒子
        if (params.sparkleIntensity > 0) {
          let sparkleCount = int(params.particleCount * params.sparkleIntensity * 0.3);
          for (let i = 0; i < sparkleCount; i++) {
            let angle = random(TWO_PI);
            let speed = random(1, 4);
            let vx = cos(angle) * speed;
            let vy = sin(angle) * speed;

            this.particles.push(new SparkleParticle(this.x, this.y, vx, vy));
          }
        }
      }

      createExplosionByType() {
        let particleCount = params.particleCount;

        switch (this.type) {
          case 'burst':
            this.createBurstExplosion(particleCount);
            break;
          case 'willow':
            this.createWillowExplosion(particleCount);
            break;
          case 'chrysanthemum':
            this.createChrysanthemumExplosion(particleCount);
            break;
          case 'palm':
            this.createPalmExplosion(particleCount);
            break;
          case 'ring':
            this.createRingExplosion(particleCount);
            break;
          case 'heart':
            this.createHeartExplosion(particleCount);
            break;
          case 'star':
            this.createStarExplosion(particleCount);
            break;
          default:
            this.createBurstExplosion(particleCount);
        }
      }

      createBurstExplosion(count) {
        for (let i = 0; i < count; i++) {
          let angle = map(i, 0, count, 0, TWO_PI);
          let speed = random(2, params.explosionPower / 15);

          let vx = cos(angle) * speed;
          let vy = sin(angle) * speed;

          let color = random(this.colors);
          this.particles.push(new Particle(this.x, this.y, vx, vy, color));
        }
      }

      createWillowExplosion(count) {
        for (let i = 0; i < count; i++) {
          let angle = map(i, 0, count, 0, TWO_PI);
          let speed = random(1, params.explosionPower / 25);

          let vx = cos(angle) * speed;
          let vy = sin(angle) * speed - random(1, 3); // 向上偏移

          let color = random(this.colors);
          this.particles.push(new WillowParticle(this.x, this.y, vx, vy, color));
        }
      }

      createChrysanthemumExplosion(count) {
        let layers = 3;
        for (let layer = 0; layer < layers; layer++) {
          let layerCount = count / layers;
          let radius = (layer + 1) * params.explosionPower / 60;

          for (let i = 0; i < layerCount; i++) {
            let angle = map(i, 0, layerCount, 0, TWO_PI);
            let vx = cos(angle) * radius;
            let vy = sin(angle) * radius;

            let color = random(this.colors);
            this.particles.push(new Particle(this.x, this.y, vx, vy, color));
          }
        }
      }

      createPalmExplosion(count) {
        let branches = 5;
        for (let branch = 0; branch < branches; branch++) {
          let branchAngle = map(branch, 0, branches, 0, TWO_PI);
          let branchCount = count / branches;

          for (let i = 0; i < branchCount; i++) {
            let spread = random(-0.3, 0.3);
            let angle = branchAngle + spread;
            let speed = random(2, params.explosionPower / 20);

            let vx = cos(angle) * speed;
            let vy = sin(angle) * speed;

            let color = random(this.colors);
            this.particles.push(new Particle(this.x, this.y, vx, vy, color));
          }
        }
      }

      createRingExplosion(count) {
        for (let i = 0; i < count; i++) {
          let angle = map(i, 0, count, 0, TWO_PI);
          let speed = params.explosionPower / 20;

          let vx = cos(angle) * speed;
          let vy = sin(angle) * speed;

          let color = random(this.colors);
          this.particles.push(new Particle(this.x, this.y, vx, vy, color));
        }
      }

      createHeartExplosion(count) {
        for (let i = 0; i < count; i++) {
          let t = map(i, 0, count, 0, TWO_PI);
          let x = 16 * pow(sin(t), 3);
          let y = -(13 * cos(t) - 5 * cos(2 * t) - 2 * cos(3 * t) - cos(4 * t));

          let speed = params.explosionPower / 400;
          let vx = x * speed;
          let vy = y * speed;

          let color = random(this.colors);
          this.particles.push(new Particle(this.x, this.y, vx, vy, color));
        }
      }

      createStarExplosion(count) {
        let points = 5;
        for (let point = 0; point < points; point++) {
          let pointAngle = map(point, 0, points, 0, TWO_PI);
          let pointCount = count / points;

          for (let i = 0; i < pointCount; i++) {
            let spread = random(-0.1, 0.1);
            let angle = pointAngle + spread;
            let speed = random(3, params.explosionPower / 15);

            let vx = cos(angle) * speed;
            let vy = sin(angle) * speed;

            let color = random(this.colors);
            this.particles.push(new Particle(this.x, this.y, vx, vy, color));
          }
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 粒子类定义
    // ═══════════════════════════════════════════════════════════════════════

    class Particle {
      constructor(x, y, vx, vy, color) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = 255;
        this.decay = random(1.5, 4);
        this.size = random(2, 8);
        this.trail = [];
        this.brightness = random(0.8, 1.0);
        this.twinkle = random(0.1, 0.3);
        this.twinkleTimer = 0;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += params.gravity;
        this.vx *= 0.985;

        this.life -= this.decay;
        this.twinkleTimer += this.twinkle;

        // 边界检查 - 如果粒子飞出屏幕太远，加速衰减
        if (this.x < -50 || this.x > width + 50 || this.y > height + 50) {
          this.life -= 10;
        }

        // 添加拖尾 - 减少拖尾长度
        this.trail.push({
          x: this.x,
          y: this.y,
          life: this.life,
          size: this.size * 0.7
        });
        if (this.trail.length > 5) {
          this.trail.shift();
        }
      }

      display() {
        // 绘制拖尾 - 减少拖尾长度以提高性能
        for (let i = 0; i < this.trail.length; i++) {
          let alpha = map(i, 0, this.trail.length - 1, 0, this.life * 0.8);
          let size = map(i, 0, this.trail.length - 1, 1, this.trail[i].size);

          fill(red(this.color), green(this.color), blue(this.color), alpha);
          noStroke();
          ellipse(this.trail[i].x, this.trail[i].y, size);
        }

        // 简化闪烁效果 - 只在生命值高时计算
        let mainAlpha = this.life;
        if (this.life > 100) {
          let twinkleEffect = (sin(this.twinkleTimer) + 1) * 0.5;
          mainAlpha *= (0.8 + 0.2 * twinkleEffect);
        }

        // 绘制主体
        fill(red(this.color), green(this.color), blue(this.color), mainAlpha);
        ellipse(this.x, this.y, this.size);

        // 内核高亮 - 只在生命值高时绘制
        if (this.life > 80) {
          fill(255, 255, 255, mainAlpha * 0.5);
          ellipse(this.x, this.y, this.size * 0.4);
        }

        // 添加光晕 - 减少光晕层数
        if (this.life > 100) {
          let haloAlpha = this.life * 0.15;
          fill(red(this.color), green(this.color), blue(this.color), haloAlpha);
          ellipse(this.x, this.y, this.size * 2);
        }
      }

      isDead() {
        return this.life <= 0;
      }
    }

    class WillowParticle extends Particle {
      constructor(x, y, vx, vy, color) {
        super(x, y, vx, vy, color);
        this.decay = random(0.8, 2); // 更慢的衰减
        this.size = random(1, 4); // 更小的粒子
        this.dragCoeff = 0.95; // 更强的阻力
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += params.gravity * 1.2; // 更强的重力
        this.vx *= this.dragCoeff;
        this.vy *= this.dragCoeff;

        this.life -= this.decay;
        this.twinkleTimer += this.twinkle;

        // 边界检查 - 柳树粒子飞出屏幕时加速衰减
        if (this.x < -50 || this.x > width + 50 || this.y > height + 50) {
          this.life -= 8; // 加速衰减
        }

        // 更长的拖尾 - 减少长度以提高性能
        this.trail.push({
          x: this.x,
          y: this.y,
          life: this.life,
          size: this.size * 0.5
        });
        if (this.trail.length > 8) {
          this.trail.shift();
        }
      }

      display() {
        // 绘制更长的拖尾
        for (let i = 0; i < this.trail.length; i++) {
          let alpha = map(i, 0, this.trail.length - 1, 0, this.life * 0.9);
          let size = map(i, 0, this.trail.length - 1, 0.5, this.trail[i].size);

          fill(red(this.color), green(this.color), blue(this.color), alpha);
          noStroke();
          ellipse(this.trail[i].x, this.trail[i].y, size);
        }

        // 主体更小更柔和
        let twinkleEffect = (sin(this.twinkleTimer) + 1) * 0.5;
        let currentBrightness = this.brightness * (0.6 + 0.4 * twinkleEffect);
        let mainAlpha = this.life * currentBrightness;

        fill(red(this.color), green(this.color), blue(this.color), mainAlpha);
        ellipse(this.x, this.y, this.size);
      }
    }

    class SparkleParticle extends Particle {
      constructor(x, y, vx, vy) {
        super(x, y, vx, vy, '#ffffff');
        this.sparkle = true;
        this.sparkleTimer = 0;
        this.sparkleSpeed = random(0.15, 0.4);
        this.size = random(1, 4);
        this.decay = random(3, 6);
      }

      update() {
        super.update();
        this.sparkleTimer += this.sparkleSpeed;
      }

      display() {
        this.sparkleTimer += this.sparkleSpeed;
        let sparkleAlpha = (sin(this.sparkleTimer) + 1) * 0.5 * this.life;

        // 主闪烁
        fill(255, 255, 255, sparkleAlpha);
        noStroke();

        // 绘制十字星形闪烁 - 简化绘制
        push();
        translate(this.x, this.y);

        // 水平线
        rect(-this.size, -this.size * 0.2, this.size * 2, this.size * 0.4);
        // 垂直线
        rect(-this.size * 0.2, -this.size, this.size * 0.4, this.size * 2);

        // 对角线
        rotate(PI / 4);
        rect(-this.size * 0.7, -this.size * 0.15, this.size * 1.4, this.size * 0.3);

        pop();

        // 简化光晕 - 只绘制一层
        if (this.life > 80) {
          fill(255, 255, 255, sparkleAlpha * 0.3);
          ellipse(this.x, this.y, this.size * 2);
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 控制函数
    // ═══════════════════════════════════════════════════════════════════════

    function launchFirework() {
      let startX = random(width * 0.2, width * 0.8);
      let startY = height;

      // 确保目标点在安全的可视范围内
      let targetX = random(width * 0.15, width * 0.85);
      let targetY = random(height * 0.15, height * 0.65);

      // 进一步约束，确保不会太靠近边缘
      targetX = constrain(targetX, 100, width - 100);
      targetY = constrain(targetY, 80, height - 150);

      // 随机选择烟花类型和颜色
      let type = random(fireworkTypes);
      let colors = random(colorPalettes);

      fireworks.push(new Firework(startX, startY, targetX, targetY, colors, type));
    }

    function launchRandomFirework() {
      launchFirework();
    }

    function launchBurst() {
      // 连发时使用不同的类型和颜色
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          let startX = random(width * 0.15, width * 0.85);
          let startY = height;

          // 确保连发时的目标点分布更合理
          let targetX = random(width * 0.2, width * 0.8);
          let targetY = random(height * 0.2, height * 0.7);

          // 约束在安全范围内
          targetX = constrain(targetX, 100, width - 100);
          targetY = constrain(targetY, 80, height - 150);

          let type = random(fireworkTypes);
          let colors = random(colorPalettes);

          fireworks.push(new Firework(startX, startY, targetX, targetY, colors, type));
        }, i * 150); // 稍微快一点的间隔
      }
    }

    function clearScreen() {
      fireworks = [];
      particles = [];
      background(10, 10, 15);
    }

    

    // 性能优化：清理超出屏幕范围的烟花
    function cleanupOffscreenFireworks() {
      for (let i = fireworks.length - 1; i >= 0; i--) {
        let fw = fireworks[i];

        // 如果烟花还在发射阶段但已经超出屏幕范围很远
        if (!fw.exploded) {
          if (fw.x < -100 || fw.x > width + 100 || fw.y < -100 || fw.y > height + 100) {
            fireworks.splice(i, 1);
            continue;
          }
        }

        // 如果烟花已爆炸，检查是否所有粒子都已消失或超出范围
        if (fw.exploded) {
          let activeParticles = 0;
          for (let particle of fw.particles) {
            if (particle.life > 0 &&
              particle.x > -100 && particle.x < width + 100 &&
              particle.y > -100 && particle.y < height + 100) {
              activeParticles++;
            }
          }

          // 如果没有活跃粒子在屏幕范围内，移除烟花
          if (activeParticles === 0) {
            fireworks.splice(i, 1);
          }
        }
      }
    }

    function launchFireworkToPosition(targetX, targetY) {
      let startX = random(width * 0.2, width * 0.8);
      let startY = height;

      // 确保用户点击的目标点在安全范围内
      targetX = constrain(targetX, 100, width - 100);
      targetY = constrain(targetY, 80, height - 150);

      // 随机选择烟花类型和颜色
      let type = random(fireworkTypes);
      let colors = random(colorPalettes);

      fireworks.push(new Firework(startX, startY, targetX, targetY, colors, type));
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 移动端控制函数
    // ═══════════════════════════════════════════════════════════════════════

    function toggleControlPanel() {
      const panel = document.getElementById('control-panel');
      const toggle = document.getElementById('mobile-toggle');

      if (!panel || !toggle) {
        console.error('控制面板或切换按钮未找到');
        return;
      }

      console.log('切换控制面板，当前状态:', panel.classList.contains('show'));

      panel.classList.toggle('show');
      toggle.classList.toggle('active');

      // 更新按钮图标
      if (panel.classList.contains('show')) {
        toggle.innerHTML = '✕';
        console.log('控制面板已显示');
      } else {
        toggle.innerHTML = '⚙️';
        console.log('控制面板已隐藏');
      }
    }

    // 检测设备类型
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
        window.innerWidth <= 768;
    }

    // 优化移动端触摸体验
    function optimizeForMobile() {
      if (isMobileDevice()) {
        console.log('检测到移动设备，应用移动端优化');

        // 确保移动端切换按钮可见
        const mobileToggle = document.getElementById('mobile-toggle');
        const touchControls = document.getElementById('touch-controls');

        if (mobileToggle) {
          mobileToggle.style.display = 'flex';
          console.log('移动端切换按钮已显示');
        }

        if (touchControls) {
          touchControls.style.display = 'flex';
          console.log('触摸控制按钮已显示');
        }

        // 确保控制面板在移动端默认隐藏
        const controlPanel = document.getElementById('control-panel');
        if (controlPanel) {
          controlPanel.classList.remove('show');
          console.log('控制面板已隐藏');
        }

        // 禁用双击缩放
        document.addEventListener('touchstart', function (e) {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
          const now = (new Date()).getTime();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        }, false);

        // 添加触摸控制按钮事件监听器
        const launchBtn = document.getElementById('launch-btn');
        const burstBtn = document.getElementById('burst-btn');
        const clearBtn = document.getElementById('clear-btn');

        if (launchBtn) {
          launchBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
          });

          launchBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            launchFirework();
          });

          launchBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            launchFirework();
          });
        }

        if (burstBtn) {
          burstBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
          });

          burstBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            launchBurst();
          });

          burstBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            launchBurst();
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
          });

          clearBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            clearScreen();
          });

          clearBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            clearScreen();
          });
        }

        // 添加触摸反馈给其他按钮
        const otherButtons = document.querySelectorAll('.control-button, .mobile-toggle');
        otherButtons.forEach(button => {
          button.addEventListener('touchstart', function () {
            this.style.transform = 'scale(0.95)';
          });

          button.addEventListener('touchend', function () {
            setTimeout(() => {
              this.style.transform = '';
            }, 150);
          });
        });

        // 优化滑块触摸体验
        const sliders = document.querySelectorAll('.slider');
        sliders.forEach(slider => {
          slider.addEventListener('touchstart', function (e) {
            e.stopPropagation();
          });

          slider.addEventListener('touchmove', function (e) {
            e.stopPropagation();
          });
        });
      } else {
        console.log('检测到桌面设备');
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 备用触摸按钮初始化
    // ═══════════════════════════════════════════════════════════════════════

    function initializeTouchButtons() {
      // 确保在DOM加载完成后初始化按钮
      setTimeout(() => {
        const launchBtn = document.getElementById('launch-btn');
        const burstBtn = document.getElementById('burst-btn');
        const clearBtn = document.getElementById('clear-btn');

        // 发射烟花按钮
        if (launchBtn && !launchBtn.hasAttribute('data-initialized')) {
          launchBtn.setAttribute('data-initialized', 'true');

          launchBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
            this.style.boxShadow = '0 0 20px rgba(255, 71, 87, 0.8)';
          });

          launchBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            this.style.boxShadow = '';
            console.log('发射烟花按钮被点击');
            launchFirework();
          });

          launchBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('发射烟花按钮被点击 (click)');
            launchFirework();
          });
        }

        // 连发按钮
        if (burstBtn && !burstBtn.hasAttribute('data-initialized')) {
          burstBtn.setAttribute('data-initialized', 'true');

          burstBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
            this.style.boxShadow = '0 0 20px rgba(0, 245, 255, 0.8)';
          });

          burstBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            this.style.boxShadow = '';
            console.log('连发按钮被点击');
            launchBurst();
          });

          burstBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('连发按钮被点击 (click)');
            launchBurst();
          });
        }

        // 清屏按钮
        if (clearBtn && !clearBtn.hasAttribute('data-initialized')) {
          clearBtn.setAttribute('data-initialized', 'true');

          clearBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = 'scale(0.9)';
            this.style.boxShadow = '0 0 20px rgba(0, 245, 255, 0.8)';
          });

          clearBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();
            this.style.transform = '';
            this.style.boxShadow = '';
            console.log('清屏按钮被点击');
            clearScreen();
          });

          clearBtn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('清屏按钮被点击 (click)');
            clearScreen();
          });
        }
      }, 1000); // 延迟1秒确保DOM完全加载
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 增强的触摸交互
    // ═══════════════════════════════════════════════════════════════════════

    let touchStartTime = 0;
    let touchStartPos = { x: 0, y: 0 };

    function touchStarted() {
      touchStartTime = millis();
      touchStartPos.x = mouseX;
      touchStartPos.y = mouseY;

      // 防止默认的触摸行为
      return false;
    }

    function touchEnded() {
      const touchDuration = millis() - touchStartTime;
      const touchDistance = dist(mouseX, mouseY, touchStartPos.x, touchStartPos.y);

      // 如果是短时间的轻触且没有移动太远，则发射烟花
      if (touchDuration < 500 && touchDistance < 20) {
        // 检查触摸位置是否在画布区域
        if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
          // 避免在控制面板区域发射烟花
          const panel = document.getElementById('control-panel');
          const panelRect = panel.getBoundingClientRect();
          const canvasRect = document.getElementById('fireworks-canvas').getBoundingClientRect();

          const relativeX = mouseX + canvasRect.left;
          const relativeY = mouseY + canvasRect.top;

          if (!(relativeX >= panelRect.left && relativeX <= panelRect.right &&
            relativeY >= panelRect.top && relativeY <= panelRect.bottom)) {
            launchFireworkToPosition(mouseX, mouseY);
          }
        }
      }

      return false;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // UI 控制处理
    // ═══════════════════════════════════════════════════════════════════════

    function initializeControls() {
      // 为所有滑块添加事件监听器
      const sliders = ['launchRate', 'explosionPower', 'particleCount', 'gravity', 'trailLength', 'sparkleIntensity'];

      sliders.forEach(sliderId => {
        const slider = document.getElementById(sliderId);
        const valueDisplay = document.getElementById(sliderId + '-value');

        slider.addEventListener('input', function () {
          params[sliderId] = parseFloat(this.value);
          valueDisplay.textContent = this.value;
        });

        // 初始化显示值
        valueDisplay.textContent = slider.value;
        params[sliderId] = parseFloat(slider.value);
      });
    }

    function updateStats() {
      frameCounter++;

      if (millis() - lastFPSUpdate > 1000) {
        document.getElementById('fps').textContent = frameCounter;
        frameCounter = 0;
        lastFPSUpdate = millis();
      }

      document.getElementById('firework-count').textContent = fireworks.length;

      let totalParticles = 0;
      fireworks.forEach(fw => {
        totalParticles += fw.particles.length;
      });
      document.getElementById('particle-count').textContent = totalParticles;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 加载动画
    // ═══════════════════════════════════════════════════════════════════════

    function simulateLoading() {
      let progress = 0;
      const loadingInterval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress >= 100) {
          progress = 100;
          clearInterval(loadingInterval);

          setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
              document.getElementById('loading-screen').style.display = 'none';
            }, 500);
          }, 500);
        }

        document.getElementById('loading-progress').style.width = progress + '%';
      }, 100);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 键盘和鼠标交互（桌面端）
    // ═══════════════════════════════════════════════════════════════════════

    function keyPressed() {
      if (key === ' ') {
        launchFirework();
      } else if (key === 'b' || key === 'B') {
        launchBurst();
      } else if (key === 'c' || key === 'C') {
        clearScreen();
      }
    }

    // 鼠标点击发射烟花（桌面端）
    function mousePressed() {
      if (!isMobileDevice() && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
        let startX = random(width * 0.2, width * 0.8);
        let startY = height;

        // 确保鼠标点击的目标点在安全范围内
        let targetX = constrain(mouseX, 100, width - 100);
        let targetY = constrain(mouseY, 80, height - 150);

        // 随机选择烟花类型和颜色
        let type = random(fireworkTypes);
        let colors = random(colorPalettes);

        fireworks.push(new Firework(startX, startY, targetX, targetY, colors, type));
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 页面加载完成后的初始化
    // ═══════════════════════════════════════════════════════════════════════

    // 确保页面完全加载后初始化按钮
    window.addEventListener('load', function () {
      initializeTouchButtons();
    });

    // DOM内容加载完成后也尝试初始化
    document.addEventListener('DOMContentLoaded', function () {
      initializeTouchButtons();
    });
  </script>
</body>

</html>
